<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <title>LevelUP Hub - Xbox</title>
        <link rel="icon" type="image/x-icon" href="images/logo_simple(1).png">
        
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    
    <body id="xbx" class="overflow-x-hidden flex flex-col min-h-screen text-white">
        <header class="bg-[#4b4b6f] w-full h-32 flex items-center px-8 shadow-md">    
            <a href="Index.html">
                <img src="images/logo.png" class="h-24 w-auto">
            </a>    
        </header>

        <main class="flex-grow w-full pt-6 px-12 flex flex-col">
            <div class="mb-8 w-full flex justify-start">
                <span class="text-3xl text-black cursor-pointer font-bold hover:text-gray-600 transition-colors" onclick="openNav()">&#9776; open</span>
                
                <div id="mySidenav" class="sidenav"> 
                    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
                    <li><a href="pc.html"><img class="w-16 mx-auto" src="images/pc_logo.png"></a></li>
                    <li><a href="nintendo.html"><img class="w-16 mx-auto" src="images/nintendo_logo_logo.png"></a></li>
                    <li><a href="xbox.html"><img class="w-16 mx-auto" src="images/xbox_one_logo_logo.png"></a></li>
                    <li><a href="playstation.html"><img class="w-16 mx-auto" src="images/playstation_logo.png"></a></li>
                </div>
            </div>
            
            <div class="w-full flex justify-center mb-16">
               <div class="bg-[#4D4D4D] w-full max-w-5xl md:h-[400px] rounded-[55px] p-10 flex flex-col md:flex-row justify-evenly items-center gap-8 shadow-xl">
                    
                    <div class="flex flex-col items-center text-center w-1/3 hover:scale-105 transition-transform">
                        <img src="images/ark.png" class="h-48 w-auto object-contain mb-4 drop-shadow-lg">
                        <p class="text-lg leading-snug">ARK: Survival Evolved</p>
                    </div>
                    
                    <div class="flex flex-col items-center text-center w-1/3 hover:scale-105 transition-transform">
                        <img src="images/rdr2.jpg" class="h-48 w-auto object-contain mb-4 drop-shadow-lg">
                        <p class="text-lg leading-snug">Red Dead Redemption II</p>    
                    </div>
                
                    <div class="flex flex-col items-center text-center w-1/3 hover:scale-105 transition-transform">
                        <img src="images/halo_the%20masterchief.png" class="h-48 w-auto object-contain mb-4 drop-shadow-lg">
                        <p class="text-lg leading-snug">HALO: The Masterchief Collection</p>
                    </div>

                </div>     
            </div>
        </main>

        <footer class="w-full bg-[#b4b4b4] flex justify-between items-center px-12 py-8 mt-16 text-white">      
            <div class="w-1/2">
                <a href="references.html" class="hover:text-gray-700 transition-colors">
                    <p class="text-lg underline">All credits to their respectively authors. Click here</p>
                </a>
            </div>
            <div class="text-right">
                <h2 class="text-xl font-bold uppercase tracking-widest mb-4">Get social</h2>
                <div class="flex space-x-6 justify-end">
                    <a href="https://www.instagram.com/lv.uphub" class="hover:scale-125 transition-transform">
                        <img src="images/ins.png" class="w-10 h-10">
                    </a>
                    <a href="https://www.youtube.com/channel/UCa5y20KSaEzkTBFcbnfrYRg" class="hover:scale-125 transition-transform">
                        <img src="images/you.png" class="w-10 h-10">
                    </a>
                    <a href="https://www.tiktok.com/@level_uphub" class="hover:scale-125 transition-transform">
                        <img src="images/tok.png" class="w-10 h-10">
                    </a>
                </div>
            </div>
        </footer>
